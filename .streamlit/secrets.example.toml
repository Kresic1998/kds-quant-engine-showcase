# Example Streamlit secrets — copy to `secrets.toml` locally (never commit `secrets.toml`).
# Env vars override these keys where supported (see `engine/secrets_util.py`, `engine/db_backend.py`).
# Supabase: prefer transaction pooler URI (port 6543); see `docs/SUPABASE_SETUP.md`.

# --- PostgreSQL (optional; omit to use local SQLite) ---
# DATABASE_URL = "postgresql://USER:PASSWORD@aws-0-eu-central-1.pooler.supabase.com:6543/postgres?sslmode=require"

# Alternative flat keys (same effect as DATABASE_URL):
# SUPABASE_DB_URL = ""
# SUPABASE_POSTGRES_URL = ""

# Nested form (also supported by db_backend):
# [supabase]
# db_url = "postgresql://..."

# [connections.postgresql]
# url = "postgresql://..."

# --- External APIs (optional; many paths work in DEMO_MODE without keys) ---
# FRED_API_KEY = "your_fred_api_key"
# EIA_API_KEY = "your_eia_api_key"
# GEMINI_API_KEY = "your_gemini_api_key"
# GEMINI_QUANT_MODEL = "gemini-2.0-flash"

# --- Telegram (if you use notify paths that read from secrets) ---
# TELEGRAM_BOT_TOKEN = ""
# TELEGRAM_CHAT_ID = ""
